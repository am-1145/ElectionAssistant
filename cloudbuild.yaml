steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '--progress=plain'
      - '-t'
      - 'gcr.io/$PROJECT_ID/election-assistant:$COMMIT_SHA'
      - '--build-arg'
      - 'VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY:-}'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/election-assistant:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'election-assistant'
      - '--image'
      - 'gcr.io/$PROJECT_ID/election-assistant:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
images:
  - 'gcr.io/$PROJECT_ID/election-assistant:$COMMIT_SHA'
